name: helios_hash_dao
description: A new Flutter project for HeliosHash DAO mobile app.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  device_preview: ^1.1.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  supabase_flutter: ^2.0.0
  file_picker: ^6.1.0
  flutter_tts: ^3.8.3
  shimmer: ^3.0.0
  collection: ^1.17.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Bold.ttf
          weight: 700
