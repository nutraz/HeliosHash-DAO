name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: 'pnpm'
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Run unit/integration tests (Vitest)
        run: pnpm test:run
      - name: Upload Vitest JSON report
        uses: actions/upload-artifact@v4
        with:
          name: vitest-report
          path: vitest-report.json
        if: always()
      - name: Run canister tests
        run: pnpm test:canister
      - name: Run E2E tests (Playwright)
        run: pnpm test:e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
        if: always()
