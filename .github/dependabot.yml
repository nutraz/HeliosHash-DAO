version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
    ignore:
      - dependency-name: 'validate.js'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
