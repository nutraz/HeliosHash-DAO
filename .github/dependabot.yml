version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
    open-pull-requests-limit: 5
    reviewers:
      - 'nutraz'
    assignees:
      - 'nutraz'
    commit-message:
      prefix: 'chore(deps)'
    ignore:
      - dependency-name: 'validate.js'
    labels:
      - 'dependencies'
      - 'security'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
    reviewers:
      - 'nutraz'
    assignees:
      - 'nutraz'
    labels:
      - 'dependencies'
      - 'ci'
